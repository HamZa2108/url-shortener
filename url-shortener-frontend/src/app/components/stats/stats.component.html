<div class="space-y-6">
  <div>
    <h2 class="text-2xl font-semibold text-white">Link Stats</h2>
    <p class="text-gray-400 text-sm mt-1">Look up click count for any short code.</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="flex gap-2">
    <input
      type="text"
      formControlName="code"
      placeholder="e.g. 1, 2, abc"
      class="flex-1 bg-gray-900 border border-gray-800 rounded-md px-4 py-2.5 text-sm text-gray-100 placeholder:text-gray-600 focus:outline-none focus:border-blue-500"
    />
    <button type="submit" [disabled]="form.invalid || loading()"
            class="px-5 py-2.5 bg-blue-600 hover:bg-blue-500 disabled:bg-gray-800 disabled:text-gray-500 text-white text-sm font-medium rounded-md transition">
      {{ loading() ? 'Loading...' : 'Look up' }}
    </button>
  </form>

  @if (error()) {
    <div class="bg-red-950/50 border border-red-900 text-red-300 text-sm rounded-md px-4 py-3">
      {{ error() }}
    </div>
  }

  @if (stats(); as s) {
    <div class="bg-gray-900 border border-gray-800 rounded-md p-6">
      <div class="grid grid-cols-2 gap-6 mb-6 pb-6 border-b border-gray-800">
        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Total clicks</p>
          <p class="text-3xl font-semibold text-white">{{ s.clickCount }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Created</p>
          <p class="text-sm text-gray-300">{{ s.createdAt | date: 'medium' }}</p>
        </div>
      </div>
      <div class="space-y-3">
        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Short code</p>
          <p class="font-mono text-gray-200">{{ s.shortCode }}</p>
        </div>
        <div>
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Original URL</p>
          <a [href]="s.longUrl" target="_blank" rel="noopener"
             class="text-blue-400 hover:text-blue-300 text-sm break-all">{{ s.longUrl }}</a>
        </div>
      </div>
    </div>
  }
</div>
